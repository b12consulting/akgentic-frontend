<div class="input-container">
  <div *ngIf="replyContext" class="reply-indicator">
    <span>Reply to {{ replyContextDisplayName }}</span>
    <i class="pi pi-times reply-indicator-close" role="button" aria-label="Clear reply context" (click)="clearReplyContext()"></i>
  </div>
  <p-floatlabel variant="in">
    <div class="input-row">
      <textarea
        pTextarea
        rows="4"
        cols="50"
        [autoResize]="true"
        [style]="{ 'max-height': '400px', 'overflow-y': 'auto' }"
        [(ngModel)]="userInput"
        (keydown.enter)="userInputEnterKeySubmit ? sendMessage() : null"
        (keydown.meta.enter)="sendMessage()"
        (keydown.control.enter)="sendMessage()"
        [mention]="mentionItems"
        [mentionConfig]="{
          triggerChar: '@',
          labelKey: 'name',
          returnTrigger: true,
          allowSpace: true,
          mentionSelect: selectAgent,
          dropUp: true,
          maxItems: 10
        }"
      ></textarea>
      <label for="on_label">Process input</label>
    </div>
  </p-floatlabel>

  <div class="button-group">
    <app-process-controls></app-process-controls>
    <p-button
      size="small"
      label="Submit"
      (click)="sendMessage()"
      [disabled]="!userInput"
    />
  </div>
</div>

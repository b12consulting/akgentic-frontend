<div class="config-editor-container">
  <div class="config-notice">
    <p-tag value="V2 Community Tier" severity="info"></p-tag>
    <p style="margin-top: 0.5rem">
      Configuration management is not available in V2 community tier.
      Team configurations are managed via catalog YAML files.
    </p>
  </div>

  <div *ngIf="loading" style="text-align: center; padding: 2rem">
    <i class="pi pi-spinner pi-spin" style="font-size: 2rem"></i>
  </div>

  <div *ngIf="!loading && (namespaces$ | async) as namespaces">
    <h4>Available Catalog Namespaces</h4>
    <ul *ngIf="namespaces.length > 0">
      <li *ngFor="let ns of namespaces" [attr.title]="ns.description">
        {{ ns.name }}
      </li>
    </ul>
    <p *ngIf="namespaces.length === 0">No catalog namespaces found.</p>
  </div>
</div>

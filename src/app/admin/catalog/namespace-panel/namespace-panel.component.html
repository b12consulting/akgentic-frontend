<div class="namespace-panel">
  <!-- Loading spinner branch -->
  <div *ngIf="loading" class="namespace-panel__loading">
    <i class="pi pi-spinner pi-spin"></i>
    <span>Loading namespace…</span>
  </div>

  <!-- Empty / error branch: no server YAML and not loading -->
  <div
    *ngIf="!loading && serverYaml === ''"
    class="namespace-panel__empty"
  >
    Unable to load namespace '{{ namespace }}'
  </div>

  <!-- Editor branch: we have content -->
  <ng-container *ngIf="!loading && serverYaml !== ''">
    <!--
      ngModel is split into [ngModel] + (ngModelChange) so the change
      handler can invalidate the edit-mode Validate-buffer success flash
      as soon as the user modifies the YAML — a clean-report ack should
      not outlive the buffer it validated.
    -->
    <nu-monaco-editor
      class="namespace-panel__editor"
      [options]="editorOptions"
      [ngModel]="buffer"
      (ngModelChange)="onBufferChange($event)"
      [height]="'calc(90vh - 240px)'"
    ></nu-monaco-editor>

    <div class="namespace-panel__actions">
      <!-- View mode: Edit only. Hidden while mode === 'edit' (AC 1). -->
      <button
        *ngIf="mode === 'view'"
        pButton
        type="button"
        size="small"
        label="Edit"
        icon="pi pi-pencil"
        (click)="onEditClick()"
        data-test="edit-btn"
      ></button>

      <!-- View mode (11.4 AC 1): Validate persisted state. Disabled while
           a validate request is already in flight so double-click cannot
           double the request count (NFR7 enforcement). Flips to PrimeNG
           `success` (green) for ~2.5s after a clean report (replaces the
           panel's "Validation passed" banner — findings still render
           in-pane).
           Severity is kept static at `secondary`; the success colour is
           applied via `[class.p-button-success]` because PrimeNG's own
           `[severity]` binding does not strip the prior class when the
           input reverts (verified in the browser — both classes linger),
           so the button stays green past the timeout. Angular's class
           binding owns the class exclusively and restores correctly. -->
      <button
        *ngIf="mode === 'view'"
        pButton
        type="button"
        size="small"
        severity="secondary"
        [class.p-button-success]="validationFlashPersisted"
        label="Validate persisted state"
        [icon]="validationFlashPersisted ? 'pi pi-check' : 'pi pi-check-circle'"
        [disabled]="validating"
        (click)="onValidatePersistedClick()"
        data-test="validate-persisted-btn"
      ></button>

      <!-- Edit mode: Save + Cancel. Save is disabled until buffer !== serverYaml (AC 2). -->
      <button
        *ngIf="mode === 'edit'"
        pButton
        type="button"
        size="small"
        label="Save"
        [icon]="saving ? 'pi pi-spinner pi-spin' : 'pi pi-save'"
        [disabled]="buffer === serverYaml || saving"
        (click)="onSaveClick()"
        data-test="save-btn"
      ></button>
      <button
        *ngIf="mode === 'edit'"
        pButton
        type="button"
        size="small"
        severity="secondary"
        label="Cancel"
        icon="pi pi-times"
        [disabled]="saving"
        (click)="onCancelClick()"
        data-test="cancel-btn"
      ></button>

      <!-- Edit mode (11.4 AC 3): Validate buffer. Disabled while a save OR
           validate is in flight. Save's own `[disabled]` binding
           intentionally ignores `validating` — Validate never gates Save
           (AC 5). Same flash pattern as view-mode Validate — see comment
           above for why we toggle `p-button-success` via class binding
           instead of PrimeNG's `[severity]`. -->
      <button
        *ngIf="mode === 'edit'"
        pButton
        type="button"
        size="small"
        severity="secondary"
        [class.p-button-success]="validationFlashBuffer"
        label="Validate buffer"
        [icon]="validationFlashBuffer ? 'pi pi-check' : 'pi pi-check-square'"
        [disabled]="saving || validating"
        (click)="onValidateBufferClick()"
        data-test="validate-buffer-btn"
      ></button>

      <!-- Action-row Retry (AC 8): rendered when the previous save attempt
           failed with a non-422 error. The mutation is never auto-retried —
           the operator decides. In-toast Retry was considered (see AC 8
           allowance) but PrimeNG v19's default <p-toast> renders text-only
           without a custom template, so the action-row button is simpler
           and equally satisfies the AC. -->
      <button
        *ngIf="mode === 'edit' && lastSaveError !== null"
        pButton
        type="button"
        size="small"
        severity="warn"
        label="Retry Save"
        icon="pi pi-refresh"
        [disabled]="saving"
        (click)="onSaveClick()"
        data-test="retry-save-btn"
      ></button>

      <!-- Clone button (Story 11.5 AC 1): visible in BOTH view and edit
           modes (Clone supports "Save As" semantics over a dirty buffer —
           AC 5). Hidden automatically while loading or in the empty state
           because the outer *ngIf gates `serverYaml !== ''`. -->
      <button
        pButton
        type="button"
        size="small"
        severity="secondary"
        label="Clone"
        icon="pi pi-copy"
        [disabled]="cloning || saving"
        (click)="onCloneClick()"
        data-test="clone-btn"
      ></button>
    </div>

    <!-- Validation-report sub-component (11.4 AC 9): renders the clean
         pass / findings / unstructured fallback / nothing branches. The
         clearRequested output nulls both parent fields on click. -->
    <app-validation-report
      [report]="lastValidation"
      [rawError]="rawSaveError"
      (clearRequested)="onClearValidationClick()"
    ></app-validation-report>
  </ng-container>

  <!-- Story 11.5 — Clone sub-dialog (AC 3). Kept INSIDE the panel to
       preserve NFR6 (host-agnostic): the panel owns the dialog, the form,
       the validation, and the confirm handler. The host supplies only
       `[existingNamespaces]` for the pre-flight collision check. -->
  <p-dialog
    [visible]="cloneDialogVisible"
    (visibleChange)="onCloneDialogVisibleChange($event)"
    [modal]="true"
    [style]="{ width: '30rem' }"
    header="Clone namespace"
  >
    <div class="namespace-panel__clone-body">
      <label for="clone-dest-ns-input">Destination namespace name</label>
      <input
        id="clone-dest-ns-input"
        type="text"
        pInputText
        name="cloneDestNs"
        [(ngModel)]="cloneDestNs"
        data-test="clone-destns-input"
        autocomplete="off"
      />
      <div
        *ngIf="cloneValidationError"
        class="namespace-panel__clone-error"
        data-test="clone-validation-error"
      >
        {{ cloneValidationError }}
      </div>
    </div>
    <div class="namespace-panel__clone-actions">
      <button
        pButton
        type="button"
        size="small"
        severity="secondary"
        label="Cancel"
        [disabled]="cloning"
        (click)="onCloneCancelClick()"
        data-test="clone-cancel-btn"
      ></button>
      <button
        pButton
        type="button"
        size="small"
        label="Confirm"
        [icon]="cloning ? 'pi pi-spinner pi-spin' : 'pi pi-copy'"
        [disabled]="cloneConfirmDisabled"
        (click)="onCloneConfirmClick()"
        data-test="clone-confirm-btn"
      ></button>
    </div>
  </p-dialog>

  <!-- PrimeNG ConfirmDialog — scoped to this component via `providers:
       [ConfirmationService]` so the dialog and future route presentations
       both get an instance without app-root wiring. -->
  <p-confirmDialog></p-confirmDialog>
</div>

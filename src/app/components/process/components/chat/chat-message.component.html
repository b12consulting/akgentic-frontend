<!-- Collapsed line for Rule 3 and Rule 4 -->
<div
  *ngIf="(message().rule === 3 || message().rule === 4) && message().collapsed"
  class="collapsed-line"
  (click)="onToggleCollapse()"
>
  <span class="collapsed-label">
    [{{ message().label }}<span
      *ngIf="message().rule === 3 && notification()"
      class="notification-icon collapsed-notification-icon"
    > (<span class="hand-raised">🙋</span>)</span>]<span
      *ngIf="preview().length > 0"
      class="collapsed-preview"
    > : {{ preview() }}</span>
  </span>
  <p-button
    *ngIf="message().rule === 3"
    size="small"
    label="Reply"
    [disabled]="!notification()"
    (click)="onOpenModal($event)"
    class="open-button"
  ></p-button>
  <span class="collapsed-timestamp">{{
    message().timestamp | date : "HH:mm"
  }}</span>
</div>

<!-- Context-management markers (Epic 29 / ADR-010): rule 6 = collapsible
     "Summarized N" compaction fold; rule 7 = inert "Conversation cleared" line.
     No sender/recipient, no left/right alignment — not a chat bubble. -->
<div *ngIf="isMarker()" class="system-marker">
  <div
    class="system-marker-line"
    [class.expandable]="message().rule === 6"
    (click)="onToggleMarker()"
  >
    <i class="pi system-marker-icon" [ngClass]="markerIcon()"></i>
    <span class="system-marker-label">{{ message().label }}</span>
    <i
      *ngIf="message().rule === 6"
      class="pi system-marker-caret"
      [ngClass]="message().collapsed ? 'pi-chevron-right' : 'pi-chevron-down'"
    ></i>
    <span class="system-marker-timestamp">{{
      message().timestamp | date : "HH:mm"
    }}</span>
  </div>
  <div
    *ngIf="message().rule === 6 && !message().collapsed"
    class="system-marker-summary"
  >
    <markdown [data]="message().content"></markdown>
  </div>
</div>

<!-- Expanded bubble (Rules 1/2, or Rule 3/4 expanded) -->
<div
  *ngIf="!isMarker() && ((message().rule !== 3 && message().rule !== 4) || !message().collapsed)"
  class="message"
  [class.right]="message().alignment === 'right'"
  [class.left]="message().alignment === 'left'"
  (click)="onBubbleClick($event)"
  [class.clickable]="true"
>
  <div
    class="message-bubble"
    [class.selected]="selected()"
    [style.background-color]="message().color"
  >
    <div class="bubble-header">
      <button
        class="label-pill"
        [disabled]="message().rule === 1 || message().rule === 5"
        (click)="onLabelClick(); $event.stopPropagation()"
      >
        {{ message().label }}
      </button>
      <span
        *ngIf="message().rule === 3 && notification()"
        class="notification-icon"
      >
        <span class="hand-raised">🙋</span>
      </span>
      <span
        *ngIf="message().rule === 4 && notification()"
        class="notification-icon"
      >
        <i class="pi pi-bell"></i>
      </span>
      <p-button
        *ngIf="message().rule === 3"
        size="small"
        label="Reply"
        [disabled]="!notification()"
        (click)="onOpenModal($event)"
        class="open-button"
      ></p-button>
      <span class="bubble-timestamp">{{
        message().timestamp | date : "HH:mm"
      }}</span>
    </div>
    <div class="markdown-content">
      <markdown [data]="message().content"></markdown>
    </div>
  </div>
</div>

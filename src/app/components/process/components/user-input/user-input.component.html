<div class="input-container">
  <div *ngIf="selectedAgents.length > 0" class="reply-indicator">
    <span>Send to {{ selectedAgentsDisplay }}</span>
    <i class="pi pi-times reply-indicator-close" role="button" aria-label="Clear Send-to selection" (click)="clearSendTo()"></i>
  </div>
  <p-floatlabel variant="in">
    <div class="input-row">
      <textarea
        pTextarea
        rows="4"
        cols="50"
        [autoResize]="true"
        [style]="{ 'max-height': '400px', 'overflow-y': 'auto' }"
        [(ngModel)]="userInput"
        (keydown.enter)="userInputEnterKeySubmit ? sendMessage() : null"
        (keydown.meta.enter)="sendMessage()"
        (keydown.control.enter)="sendMessage()"
        [mentionConfig]="mentionConfig"
        [mentionListTemplate]="mentionItemTemplate"
      ></textarea>
      <label for="on_label">Process input</label>
    </div>
  </p-floatlabel>

  <!--
    ADR-013: shared mention-list item template. `@` items carry only `name`
    (description/args absent → those rows simply do not render); `/` command
    items render `name` prominently plus `description` and an optional args
    hint (e.g. `<role> [name]`).
  -->
  <ng-template #mentionItemTemplate let-item="item">
    <span class="mention-item-name">{{ item.name }}</span>
    <span *ngIf="item.args?.length" class="mention-item-args">
      {{ commandArgsHint(item.args) }}
    </span>
    <span *ngIf="item.description" class="mention-item-desc">{{ item.description }}</span>
  </ng-template>

  <div class="button-group">
    @if (humanAgents.length > 1) {
      <div class="send-as-group">
        <label class="send-as-label">Send as</label>
        <p-dropdown
          [options]="humanAgentOptions"
          [(ngModel)]="selectedSender"
          optionLabel="label"
          optionValue="value"
          placeholder="Send as"
          [showClear]="true"
          size="small"
          appendTo="body"
          [panelStyleClass]="'send-as-panel-up'"
        ></p-dropdown>
      </div>
    }
    <label class="send-to-label">Send to</label>
    <p-multiSelect
      [options]="dropdownAgents"
      [(ngModel)]="selectedAgents"
      optionLabel="label"
      optionValue="value"
      placeholder="All (supervisors)"
      [showClear]="true"
      size="small"
      display="chip"
    ></p-multiSelect>
    <p-button
      size="small"
      icon="pi pi-send"
      label="Submit"
      (click)="sendMessage()"
      [disabled]="!userInput || !(contextService.currentTeamRunning$ | async)"
    />
  </div>
</div>

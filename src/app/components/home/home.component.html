<section class="content">
  <br />
  <div class="main-container">
    <p-select
      size="small"
      [options]="(namespaces$ | async) || []"
      [ngModel]="selectedNamespace$ | async"
      (ngModelChange)="selectedNamespace$.next($event)"
      optionLabel="name"
      placeholder="Select a team type"
    >
      <ng-template let-ns pTemplate="item">
        <div [attr.title]="ns.description">{{ ns.name }}</div>
      </ng-template>
      <ng-template let-ns pTemplate="selectedItem">
        <div [attr.title]="ns.description">{{ ns.name }}</div>
      </ng-template>
    </p-select>
    &nbsp;
    <!--
      Admin-only "show all namespaces" toggle (ADR-028). Admin-gated UX
      affordance only; NOT the security boundary (the infra unscoping of admin
      reads is authoritative). `*ngIf="(isAdmin$ | async)"` so non-admins (incl.
      anonymous, no roles) never see it — hidden, not merely disabled. Default
      off (firehose is opt-in). Flips `showAllNamespaces` via `onToggleShowAll`,
      which re-runs the single `loadNamespaces()` path so `?all=true` flows
      through it.
    -->
    <span
      *ngIf="(isAdmin$ | async)"
      class="show-all-namespaces"
    >
      <p-toggleswitch
        [ngModel]="showAllNamespaces"
        (ngModelChange)="onToggleShowAll($event)"
        data-test="show-all-namespaces-toggle"
        inputId="show-all-namespaces-toggle"
      ></p-toggleswitch>
      <label for="show-all-namespaces-toggle">Show all namespaces</label>
    </span>
    &nbsp;
    <button
      pButton
      size="small"
      type="button"
      label="Create"
      [icon]="isCreatingTeam ? 'pi pi-spinner pi-spin' : 'pi pi-plus'"
      [disabled]="isCreatingTeam || ((namespaces$ | async) || []).length === 0"
      (click)="createTeam()"
      class="extra-small-button"
    ></button>
    &nbsp;
    <!-- Edit Configuration button; opens the Monaco panel in a dialog. -->
    <button
      pButton
      size="small"
      type="button"
      label="Configuration"
      icon="pi pi-pencil"
      [disabled]="!(selectedNamespace$ | async)"
      (click)="namespacePanelVisible = true"
      class="extra-small-button"
      data-test="edit-namespace-yaml-btn"
    ></button>
    &nbsp;
    <button
      pButton
      size="small"
      type="button"
      label="Refresh"
      [icon]="isRefreshing ? 'pi pi-spinner pi-spin' : 'pi pi-refresh'"
      [disabled]="isRefreshing"
      (click)="refreshContext()"
      class="extra-small-button"
    ></button>
    <br />
    <br />

    <!--
      Lazy virtual-scroll team table (ADR-031 §Decision 5). PrimeNG renders the
      body inside its own scroller (only the visible window stays in the DOM)
      and fires (onLazyLoad) as the viewport scrolls past loaded rows; loadPage
      fetches the next cursor-paginated page and appends. Server owns ordering
      (created_at desc) — the client sortField/sortOrder and the sort-icon
      affordance are gone (arbitrary client sort over a partial set cannot work).
    -->
    <p-table
      [value]="(contextService.teams$ | async) || []"
      selectionMode="single"
      (onRowSelect)="onRowSelect($event)"
      [tableStyle]="{ 'min-width': '50rem' }"
      [scrollable]="true"
      scrollHeight="calc(100vh - 180px)"
      [virtualScroll]="true"
      [virtualScrollItemSize]="virtualRowHeight"
      [rows]="100"
      [lazy]="true"
      [loading]="loading"
      (onLazyLoad)="loadPage($event)"
    >
      <ng-template #header>
        <tr>
          <th>Name</th>
          <th>Creation Date</th>
          <th>Status</th>
          <th>Team ID</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-ctx>
        <tr [pSelectableRow]="ctx">
          <td>
            <div class="team-info">
              <div class="team-name">
                {{ ctx.name }}
              </div>

              <!-- Display mode -->
              <div
                *ngIf="editingDescriptionFor !== ctx.team_id"
                class="team-description"
                (click)="
                  startEditDescription(ctx.team_id, ctx.description);
                  $event.stopPropagation()
                "
              >
                <span *ngIf="ctx.description" class="description-text">
                  {{ ctx.description }}
                </span>
                <span *ngIf="!ctx.description" class="description-placeholder">
                  Click to add description...
                </span>
              </div>

              <!-- Edit mode -->
              <div
                *ngIf="editingDescriptionFor === ctx.team_id"
                class="description-editor"
                (click)="$event.stopPropagation()"
              >
                <input
                  #descriptionInput
                  type="text"
                  pInputText
                  [ngModel]="descriptionDrafts.get(ctx.team_id)"
                  (ngModelChange)="descriptionDrafts.set(ctx.team_id, $event)"
                  placeholder="Enter team description"
                  (keyup.enter)="saveDescription(ctx.team_id)"
                  (keyup.escape)="cancelEditDescription()"
                  class="description-input"
                  maxlength="500"
                  [autofocus]="true"
                />
                <button
                  pButton
                  icon="pi pi-check"
                  (click)="saveDescription(ctx.team_id)"
                  class="description-save-btn"
                  rounded
                ></button>
                <button
                  pButton
                  icon="pi pi-times"
                  (click)="cancelEditDescription()"
                  severity="secondary"
                  class="description-cancel-btn"
                  rounded
                ></button>
              </div>
            </div>
          </td>
          <td>{{ ctx.created_at | date: "short" }}</td>
          <td>
            <p-tag
              *ngIf="!isRunning(ctx)"
              value="Stopped"
              severity="info"
            >
            </p-tag>
            <p-tag
              *ngIf="isRunning(ctx)"
              value="Running"
              severity="success"
            >
            </p-tag>
          </td>
          <td>{{ ctx.team_id }}</td>
          <td>
            <p-button
              *ngIf="isRunning(ctx)"
              [icon]="
                isStopping(ctx.team_id)
                  ? 'pi pi-spinner pi-spin'
                  : 'pi pi-stop-circle'
              "
              (click)="stopTeam(ctx.team_id)"
              severity="secondary"
              rounded
              [style]="{ 'margin-right': '0.5rem' }"
              title="Stop Team"
              [disabled]="isStopping(ctx.team_id)"
            />
            <p-button
              *ngIf="!isRunning(ctx)"
              [icon]="
                isRestoring(ctx.team_id)
                  ? 'pi pi-spinner pi-spin'
                  : 'pi pi-replay'
              "
              (click)="restoreTeam(ctx.team_id)"
              severity="secondary"
              rounded
              [style]="{ 'margin-right': '0.5rem' }"
              title="Restore Team"
              [disabled]="isRestoring(ctx.team_id)"
            />
            &nbsp;
            <p-button
              icon="pi pi-times"
              (click)="deleteTeam(ctx.team_id)"
              severity="secondary"
              rounded
              title="Delete Team"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>

<!--
  Namespace Panel dialog wrapper.

  `@defer (when namespacePanelVisible)` fetches the NamespacePanelComponent
  (and its Monaco-editor chunk) only on first open. The initial home-page
  bundle stays Monaco-free.

  [(visible)] is split into [visible] + (visibleChange) so the dirty-close
  guard can intercept dismissals; the dirty-close prompt is rendered by the
  panel's own confirm modal via `panel.confirmDiscard()` (ADR-018).

  The header is a <ng-template pTemplate="header"> block so it can render the
  namespace name AND the conditional dirty indicator in the same header.

  [closable] / [dismissableMask] lock the X / dismissable-mask dismissal
  channels during an in-flight write (saving OR cloning). Reads (validate /
  load) stay dismissable — `isWriteInFlight` intentionally excludes
  `validating` / `loading`.

  `[closeOnEscape]="false"` on ALL THREE dialogs (this config host + the
  panel's Clone + confirm modals). PrimeNG attaches `closeOnEscape` as a
  DOCUMENT-level listener per dialog, so a secondary modal's stopPropagation
  cannot stop this host's listener. Instead the host owns ONE coordinated
  Escape handler (`onConfigDialogEscape`, a `document:keydown.escape`
  HostListener) that closes only the topmost secondary modal, or — when none
  is open — runs the config panel close flow.
-->
<p-dialog
  [visible]="namespacePanelVisible"
  (visibleChange)="onNamespacePanelVisibleChange($event)"
  [modal]="true"
  [style]="{ width: '90vw', height: '90vh' }"
  [closable]="!isWriteInFlight"
  [closeOnEscape]="false"
  [dismissableMask]="!isWriteInFlight"
>
  <ng-template pTemplate="header">
    <span class="p-dialog-title">
      {{ namespaceLabel }}
      <span
        *ngIf="namespacePanel?.hasUnsavedChanges() === true"
        class="namespace-panel__dirty-indicator"
        aria-label="Unsaved changes"
        data-test="dirty-indicator-dialog"
      >●</span>
    </span>
  </ng-template>
  @defer (when namespacePanelVisible) {
    <app-namespace-panel
      [namespace]="((selectedNamespace$ | async)?.namespace) ?? ''"
      [existingNamespaces]="namespaceIdentifiers"
      [showAll]="showAllNamespaces"
      (closed)="namespacePanelVisible = false"
      (saved)="onNamespaceSaved()"
    />
  }
</p-dialog>
